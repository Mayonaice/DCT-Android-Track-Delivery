plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Load release signing configuration from key.properties (do NOT commit secrets)
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

def ksPath = keystoreProperties.getProperty('storeFile')
def ksStorePass = keystoreProperties.getProperty('storePassword')
def ksAlias = keystoreProperties.getProperty('keyAlias')
def ksKeyPass = keystoreProperties.getProperty('keyPassword')
if (!ksPath || ksPath.trim().isEmpty()) ksPath = System.getenv('KEYSTORE_PATH')
if (!ksStorePass || ksStorePass.trim().isEmpty()) ksStorePass = System.getenv('KEYSTORE_PASSWORD')
if (!ksAlias || ksAlias.trim().isEmpty()) ksAlias = System.getenv('KEY_ALIAS')
if (!ksKeyPass || ksKeyPass.trim().isEmpty()) ksKeyPass = System.getenv('KEY_PASSWORD')

android {
    namespace "com.dct.tracking.android_tyd"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    signingConfigs {
        debug {
            // Default debug signing provided by the Android Gradle Plugin
        }
        release {
            if (ksPath && ksStorePass && ksAlias && ksKeyPass) {
                storeFile file(ksPath)
                storePassword ksStorePass
                keyAlias ksAlias
                keyPassword ksKeyPass
            } else {
                throw new GradleException("Missing release keystore configuration. Set key.properties or env KEYSTORE_PATH/KEYSTORE_PASSWORD/KEY_ALIAS/KEY_PASSWORD.")
            }
        }
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.dct.tracking.android_tyd"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdk = flutter.minSdkVersion
        targetSdk = 35
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }

        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        debug {
            debuggable = true
            minifyEnabled = false
        }
        release {
            signingConfig signingConfigs.release
            debuggable = false
            minifyEnabled = false
            shrinkResources = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
